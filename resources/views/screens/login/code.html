<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#565e74",
                        "tertiary-fixed-dim": "#ffb690",
                        "tertiary": "#994100",
                        "on-secondary": "#ffffff",
                        "surface": "#f8f9ff",
                        "surface-variant": "#d3e4fe",
                        "on-secondary-fixed-variant": "#3f465c",
                        "tertiary-container": "#c05400",
                        "tertiary-fixed": "#ffdbca",
                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#ffb599",
                        "background": "#f8f9ff",
                        "on-tertiary-fixed": "#341100",
                        "surface-bright": "#f8f9ff",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#7f2b00",
                        "outline-variant": "#e2bfb2",
                        "surface-container-low": "#eff4ff",
                        "inverse-primary": "#ffb599",
                        "on-tertiary-container": "#fffbff",
                        "primary-container": "#cc4900",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "on-tertiary-fixed-variant": "#783200",
                        "secondary-container": "#dae2fd",
                        "surface-container-highest": "#d3e4fe",
                        "primary": "#a33900",
                        "surface-container-high": "#dce9ff",
                        "primary-fixed": "#ffdbce",
                        "on-surface-variant": "#5a4138",
                        "outline": "#8e7166",
                        "on-surface": "#0b1c30",
                        "secondary-fixed": "#dae2fd",
                        "secondary-fixed-dim": "#bec6e0",
                        "inverse-on-surface": "#eaf1ff",
                        "on-background": "#0b1c30",
                        "on-primary-fixed": "#370e00",
                        "on-secondary-container": "#5c647a",
                        "inverse-surface": "#213145",
                        "on-primary-container": "#fffbff",
                        "surface-container": "#e5eeff",
                        "on-secondary-fixed": "#131b2e",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#a73a00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "base": "8px",
                        "xs": "4px",
                        "xl": "32px",
                        "margin-mobile": "16px",
                        "sm": "8px",
                        "lg": "24px",
                        "md": "16px",
                        "gutter": "24px",
                        "margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "body-md": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"],
                        "headline-sm": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #f8f9ff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(20,100%,95%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(210,100%,98%,1) 0, transparent 50%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md text-on-background">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col gap-lg">
<!-- Logo & Branding Section -->
<header class="flex flex-col items-center text-center gap-sm">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container shadow-sm border border-outline-variant/30">
<span class="material-symbols-outlined !text-[40px]" data-icon="track_changes">track_changes</span>
</div>
<div class="mt-xs">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Trackr</h1>
<p class="font-label-md text-label-md text-secondary uppercase tracking-widest mt-1">Career Manager Login</p>
</div>
</header>
<!-- Auth Card -->
<section class="bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-lg shadow-[0px_1px_3px_rgba(15,23,42,0.08)]">
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-md font-body-md text-body-md bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none placeholder:text-on-surface-variant/40" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-md font-body-md text-body-md bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none placeholder:text-on-surface-variant/40" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-12 mt-sm bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center gap-sm shadow-sm transition-all active:scale-[0.98]" type="submit">
                    Login
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Action -->
<div class="mt-lg pt-lg border-t border-outline-variant/30 text-center">
<p class="font-body-sm text-body-sm text-secondary">
                    Don't have an account? 
                    <a class="font-label-md text-label-md text-primary hover:underline ml-xs transition-all" href="#">Get Started</a>
</p>
</div>
</section>
<!-- Trust / Visual Element (Asymmetric Detail) -->
<aside class="grid grid-cols-2 gap-sm opacity-60 grayscale hover:grayscale-0 transition-all duration-500">
<div class="flex items-center gap-xs px-md py-xs rounded-full border border-outline-variant bg-surface-container-low">
<span class="material-symbols-outlined text-[16px] text-secondary" data-icon="verified_user">verified_user</span>
<span class="font-label-sm text-label-sm text-secondary">Secure SSL</span>
</div>
<div class="flex items-center gap-xs px-md py-xs rounded-full border border-outline-variant bg-surface-container-low">
<span class="material-symbols-outlined text-[16px] text-secondary" data-icon="cloud_done">cloud_done</span>
<span class="font-label-sm text-label-sm text-secondary">Cloud Sync</span>
</div>
</aside>
<!-- Footer Info -->
<footer class="text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant/60">
                © 2024 Trackr Inc. All rights reserved.
            </p>
</footer>
</main>
</body></html>
